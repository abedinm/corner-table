<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#B7472A" />
  <meta name="robots" content="noindex" />

  <title>Page not found — Corner Table</title>

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />

  <style>
    /* 404-specific layout — reuses the design tokens from styles.css */
    .error-page {
      min-height: 100vh;
      min-height: 100svh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 2rem 1.25rem;
      background:
        radial-gradient(circle at 50% 30%, rgba(183,71,42,0.06), transparent 60%),
        var(--bg);
    }
    .error-inner { max-width: 480px; }
    .error-mark {
      width: 56px;
      height: 56px;
      margin: 0 auto 1.5rem;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      display: grid;
      place-items: center;
      font-family: 'Fraunces', serif;
      font-size: 1.5rem;
    }
    .error-code {
      font-family: 'Fraunces', serif;
      font-size: clamp(6rem, 18vw, 9rem);
      font-weight: 400;
      color: var(--accent);
      line-height: 1;
      letter-spacing: -0.04em;
      margin-bottom: 1rem;
    }
    .error-title {
      font-family: 'Fraunces', serif;
      font-weight: 500;
      font-size: clamp(1.5rem, 4vw, 2rem);
      margin-bottom: 0.75rem;
      letter-spacing: -0.01em;
    }
    .error-copy {
      color: var(--text-soft);
      margin: 0 auto 2rem;
      max-width: 38ch;
    }
    .error-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <main class="error-page">
    <div class="error-inner">
      <div class="error-mark" aria-hidden="true">CT</div>
      <p class="error-code" aria-hidden="true">404</p>
      <h1 class="error-title">This table doesn't exist.</h1>
      <p class="error-copy">The page you're looking for has wandered off — try the menu, or head back to the front of the house.</p>
      <div class="error-actions">
        <a href="./" class="btn btn-primary">Back to home</a>
        <a href="./#menu" class="btn btn-ghost">View the menu</a>
      </div>
    </div>
  </main>
</body>
</html>
