# ============================================================
# Corner Table — Netlify deployment config
# Static site, no build step. Adds security headers, cache
# control, and a branded 404 fallback.
# ============================================================

[build]
  publish = "."

# ---- Branded 404 fallback ----
# Netlify serves real files first; this only catches misses.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# ---- Security headers (applied to every response) ----
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https://images.unsplash.com; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"

# ---- Cache policies ----
# HTML revalidates each visit so menu changes ship instantly.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# CSS / JS / icons live a bit longer but still revalidate.
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

# Service worker MUST NOT be cached — otherwise stale SWs lock
# users out of new versions. This is a well-known footgun.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
